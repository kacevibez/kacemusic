<!DOCTYPE HTML>
<html>
	<head>
		<title>Kace Vibez</title>
		<link href="css/style.css" rel="stylesheet" type="text/css">
		<link rel="shortcut icon" href="img/icons/icon.jpg" type="image/x-icon">
		<script>var clicky_site_ids = clicky_site_ids || []; clicky_site_ids.push(101247088);</script>
		<script async src="//static.getclicky.com/js"></script>

	</head>
	
	<body id="beast">
		<div class="container">
			<img class="cover" src="img/cover-beast.jpg" alt="cover">
			
			<p class="caption">Some text about beast from the east</p>
			
			<div class="audioplayer">
				<audio src="music/Kace%20-%20Adura.mp3" id="song"></audio>
				<img src="img/icons/play.png" onclick="playPause()" id="play-pause"/>
				<div class="slider-time-container">
					<div id="currentTime"></div>
					<input
						type="range"
						id="progress-bar"
						min="0"
						max=""
						value="0"
						onchange="changeProgressBar()"
					/>
					<div id="durationTime"></div>
				</div>
			</div>
			
			<div class="button-container">
				<img class="portrait" src="img/kace.jpg" alt="kace"> 
				
				<a class="btn btn-odogwu" href="music/Kace%20-%20Adura.mp3" download>Download Beast from the East</a>
			
				<a class="btn btn-odogwu" href="index.html">More music</a>
			</div>
			
			<div class="social-icons">
				<a class="social-link" href="http://www.instagram.com/kace_vibez">
					<img class="social-link-img" src="img/socialinsta.png" alt="instagram link">	
				</a>
				<a class="social-link" href="http://www.facebook.com/odoh.kelvin">
					<img class="social-link-img" src="img/socialfb.png" alt="facebook link">	
				</a>
				<a class="social-link" href="https://www.youtube.com/channel/UCWvc5tPEP1a4hSb5mfCTWnw/about">
					<img class="social-link-img" src="img/socialyt.png" alt="youtube link">	
				</a>
			</div>
		</div>
		
		<script src="script/script.js" type="text/javascript"></script>
	</body>
</html>
